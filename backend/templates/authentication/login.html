{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Retail Billing Login
    </title>

    <!-- PWA -->

    <link
        rel="manifest"
        href="{% static 'pwa/manifest.json' %}"
    >

    <meta
        name="theme-color"
        content="#7c3aed"
    >

    <meta
        name="mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Retail Billing"
    >

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    fontFamily: {

                        poppins: ['Poppins', 'sans-serif']

                    }

                }

            }

        }

    </script>

</head>

<body
    class="
        font-poppins
        relative
        min-h-screen
        bg-[#020617]
        text-white
        overflow-x-hidden
        flex
        items-start
        justify-center
        px-4
        py-8
        sm:py-10
    "
>

    <!-- Background -->

    <div
        class="
            absolute
            inset-0
            overflow-hidden
        "
    >

        <div
            class="
                absolute
                inset-0
                bg-gradient-to-br
                from-blue-950
                via-slate-950
                to-purple-950
            "
        ></div>

        <div
            class="
                absolute
                top-[-100px]
                left-[-100px]
                h-[400px]
                w-[400px]
                rounded-full
                bg-cyan-500/20
                blur-3xl
                animate-pulse
            "
        ></div>

        <div
            class="
                absolute
                bottom-[-100px]
                right-[-100px]
                h-[450px]
                w-[450px]
                rounded-full
                bg-purple-500/20
                blur-3xl
                animate-pulse
            "
        ></div>

        <div
            class="
                absolute
                inset-0
                opacity-10
            "
            style="
                background-image:
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
                background-size: 40px 40px;
            "
        ></div>

    </div>

    <!-- Login Card -->

    <div
    class="
        relative
        z-10
        w-[400px]
        max-w-lg
        rounded-[32px]
        border
        border-white/10
        bg-white/5
        p-6
        sm:p-8
        backdrop-blur-2xl
        shadow-[0_0_80px_rgba(59,130,246,0.25)]
        mx-4
        my-10
    "
>
        <!-- Logo -->

        <div class="mb-10 text-center">

            <div
                class="
                    mx-auto
                    flex
                    h-28
                    w-28
                    items-center
                    justify-center
                    rounded-full
                    bg-gradient-to-r
                    from-blue-500
                    to-purple-500
                    text-5xl
                    shadow-[0_0_60px_rgba(59,130,246,0.5)]
                    animate-bounce
                "
            >
                <img class="rounded-[32px]" src="/static/assets/icons/ww-512.png" alt="Logo">
            </div>

            <h1
                class="
                    mt-6
                    text-1xl
                    font-bold
                "
            >
                Warranty Wala's Retail Billing
            </h1>

            <p
                class="
                    mt-3
                    text-sm
                    text-gray-300
                "
            >
                Electronics Shop Management System
            </p>

        </div>

        <!-- Messages -->

        {% if messages %}

            {% for message in messages %}

                <div
                    class="
                        mb-5
                        rounded-2xl
                        border
                        border-red-400/20
                        bg-red-500/20
                        p-4
                        text-sm
                        text-red-200
                    "
                >
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <!-- Form -->

        <form method="POST">

            {% csrf_token %}

            <!-- Username -->

            <div class="mb-5">

                <label
                    class="
                        mb-2
                        block
                        text-sm
                        text-gray-300
                    "
                >
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    class="
                        w-full
                        rounded-2xl
                        border
                        border-white/10
                        bg-white/10
                        px-5
                        py-4
                        text-white
                        placeholder-gray-400
                        outline-none
                        transition-all
                        duration-300
                        focus:border-blue-400
                        focus:ring-2
                        focus:ring-blue-500/40
                    "
                >

            </div>

            <!-- Password -->

            <div class="mb-6">

                <label
                    class="
                        mb-2
                        block
                        text-sm
                        text-gray-300
                    "
                >
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    class="
                        w-full
                        rounded-2xl
                        border
                        border-white/10
                        bg-white/10
                        px-5
                        py-4
                        text-white
                        placeholder-gray-400
                        outline-none
                        transition-all
                        duration-300
                        focus:border-blue-400
                        focus:ring-2
                        focus:ring-blue-500/40
                    "
                >

            </div>

            <!-- Button -->

            <button
                type="submit"
                class="
                    w-full
                    rounded-2xl
                    bg-gradient-to-r
                    from-blue-500
                    to-purple-500
                    py-4
                    text-lg
                    font-semibold
                    text-white
                    transition-all
                    duration-300
                    hover:scale-105
                    hover:shadow-[0_0_40px_rgba(59,130,246,0.6)]
                "
            >
                Login
            </button>

        </form>

        <!-- Footer -->

        <div
            class="
                mt-8
                text-center
                text-sm
                text-gray-400
            "
        >
            © 2026 Retail Billing System
        </div>

    </div>

</body>

</html>
