{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Retail Billing Login
    </title>

    <!-- PWA -->

    <link
        rel="manifest"
        href="{% static 'pwa/manifest.json' %}"
    >

    <meta
        name="theme-color"
        content="#7c3aed"
    >

    <meta
        name="mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Retail Billing"
    >

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    fontFamily: {

                        poppins: ['Poppins', 'sans-serif']

                    }

                }

            }

        }

    </script>

</head>

<body
    class="
        font-poppins
        relative
        min-h-screen
        bg-[#020617]
        text-white
        overflow-x-hidden
        flex
        items-start
        justify-center
        px-4
        py-8
        sm:py-10
    "
>

    <!-- Background -->

    <div
        class="
            absolute
            inset-0
            overflow-hidden
        "
    >

        <div
            class="
                absolute
                inset-0
                bg-gradient-to-br
                from-blue-950
                via-slate-950
                to-purple-950
            "
        ></div>

        <div
            class="
                absolute
                top-[-100px]
                left-[-100px]
                h-[400px]
                w-[400px]
                rounded-full
                bg-cyan-500/20
                blur-3xl
                animate-pulse
            "
        ></div>

        <div
            class="
                absolute
                bottom-[-100px]
                right-[-100px]
                h-[450px]
                w-[450px]
                rounded-full
                bg-purple-500/20
                blur-3xl
                animate-pulse
            "
        ></div>

        <div
            class="
                absolute
                inset-0
                opacity-10
            "
            style="
                background-image:
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
                background-size: 40px 40px;
            "
        ></div>

    </div>

    <!-- Login Card -->

<div
    class="
        relative
        z-10

        w-[400px]
        max-w-lg

        rounded-[36px]

        border
        border-cyan-400/20

        bg-gradient-to-br
        from-[#09162b]/95
        via-[#111f3d]/90
        to-[#1d1140]/90

        p-6
        sm:p-8
        md:p-10

        backdrop-blur-3xl

        overflow-hidden

        mx-4
        my-10

        shadow-[0_0_35px_rgba(0,195,255,0.18),0_0_90px_rgba(59,130,246,0.18)]

        transition-all
        duration-500

        hover:-translate-y-1
        hover:shadow-[0_0_45px_rgba(0,195,255,0.28),0_0_120px_rgba(59,130,246,0.25)]
    "
>
        <!-- Logo -->

        <div class="mb-10 text-center">

            <div
                class="
                    mx-auto
                    flex
                    h-28
                    w-28
                    items-center
                    justify-center
                    rounded-full
                    bg-gradient-to-r
                    from-blue-500
                    to-purple-500
                    text-5xl
                    shadow-[0_0_60px_rgba(59,130,246,0.5)]
                    animate-bounce
                "
            >
                <img class="rounded-[32px]" src="/static/assets/icons/ww-512.png" alt="Logo">
            </div>

            <h1
                class="
                    mt-6
                    text-1xl
                    font-bold
                "
            >
                Warranty Wala's Retail Billing
            </h1>

            <p
                class="
                    mt-3
                    text-sm
                    text-gray-300
                "
            >
                Electronics Shop Management System
            </p>

        </div>

        <!-- Messages -->

        {% if messages %}

            {% for message in messages %}

                <div
                    class="
                        mb-5
                        rounded-2xl
                        border
                        border-red-400/20
                        bg-red-500/20
                        p-4
                        text-sm
                        text-red-200
                    "
                >
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <!-- Form -->

        <form method="POST">

            {% csrf_token %}

<!-- Username -->

<div class="relative mb-6 group">

    <!-- Neon Blue Glow -->

    <div
        class="
            absolute
            -inset-[2px]
            rounded-[28px]

            bg-gradient-to-b
            from-cyan-300
            via-blue-500
            to-blue-700

            opacity-0
            blur-xl

            transition-all
            duration-300

            group-focus-within:opacity-100

            shadow-[0_0_25px_rgba(59,130,246,0.9),0_0_80px_rgba(0,183,255,0.75)]
        "
    ></div>

    <!-- Input -->

    <input
        type="text"
        name="username"
        placeholder=" "
        required

        class="
            peer
            relative
            z-10

            w-full

            rounded-[26px]

            border
            border-cyan-400/20

            bg-gradient-to-br
            from-[#0d1b35]/95
            via-[#142848]/90
            to-[#1b1140]/90

            px-5
            pt-7
            pb-3

            text-cyan-100
            text-lg
            font-medium

            caret-cyan-300

            outline-none
            backdrop-blur-3xl

            transition-all
            duration-500

            shadow-[0_10px_40px_rgba(0,140,255,0.18)]

            focus:border-cyan-300

            focus:bg-[#142848]/95

            focus:shadow-[0_0_20px_rgba(0,195,255,0.55),0_0_60px_rgba(0,140,255,0.45)]

            focus:-translate-y-[2px]
        "
    >

    <!-- Floating Label -->

    <label
        class="
            absolute
            left-5
            top-1/2
            z-20

            -translate-y-1/2

            text-cyan-200/80
            text-base
            font-medium

            pointer-events-none

            transition-all
            duration-300

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300
            peer-focus:font-semibold

            peer-focus:drop-shadow-[0_0_10px_rgba(34,211,238,1)]

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
            peer-valid:font-semibold
        "
    >
        Username
    </label>

</div>


<!-- Password -->

<div class="relative mb-7 group">

    <!-- Electric Blue Neon Glow -->

    <div
        class="
            absolute
            -inset-[2px]

            rounded-[28px]

            bg-gradient-to-b
            from-cyan-300
            via-blue-500
            to-blue-700

            opacity-0
            blur-xl

            transition-all
            duration-500

            group-focus-within:opacity-100

            shadow-[0_0_25px_rgba(59,130,246,0.95),0_0_90px_rgba(0,183,255,0.8)]
        "
    ></div>

    <!-- Password Input -->

    <input
        type="password"
        name="password"
        placeholder=" "
        required

        class="
            peer
            relative
            z-10

            w-full

            rounded-[26px]

            border
            border-cyan-400/20

            bg-gradient-to-br
            from-[#0d1b35]/95
            via-[#142848]/90
            to-[#1b1140]/90

            px-5
            pt-7
            pb-3

            text-cyan-100
            text-lg
            font-medium

            caret-cyan-300

            outline-none
            backdrop-blur-3xl

            transition-all
            duration-500

            shadow-[0_10px_40px_rgba(0,140,255,0.18)]

            focus:border-cyan-300

            focus:bg-[#142848]/95

            focus:shadow-[0_0_20px_rgba(0,195,255,0.55),0_0_60px_rgba(0,140,255,0.45)]

            focus:-translate-y-[2px]

            hover:border-cyan-200/50
        "
    >

    <!-- Floating Label -->

    <label
        class="
            absolute
            left-5
            top-1/2
            z-20

            -translate-y-1/2

            text-cyan-200/80
            text-base
            font-medium

            pointer-events-none

            transition-all
            duration-300

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300
            peer-focus:font-semibold

            peer-focus:drop-shadow-[0_0_10px_rgba(34,211,238,1)]

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
            peer-valid:font-semibold
        "
    >
        Password
    </label>

</div>


<!-- 3D HD PWA Login Button -->

<button
  type="submit"
  class="
    group
    relative
    isolate
    overflow-hidden

    w-full

    rounded-[34px]

    bg-gradient-to-br
    from-cyan-300
    via-blue-500
    to-violet-700

    px-8
    py-5

    text-lg
    md:text-xl
    font-extrabold
    tracking-[1px]

    text-white

    border
    border-white/15

    transition-all
    duration-500

    transform-gpu
    perspective-[1200px]

    hover:scale-[1.03]
    hover:-translate-y-2

    active:translate-y-[3px]
    active:scale-[0.98]

    shadow-[0_12px_0_rgb(49,46,129),0_25px_45px_rgba(0,0,0,0.45),0_0_35px_rgba(34,211,238,0.55)]

    before:absolute
    before:inset-0
    before:rounded-[34px]
    before:bg-[linear-gradient(180deg,rgba(255,255,255,0.45)_0%,rgba(255,255,255,0.06)_40%,transparent_100%)]
    before:opacity-90
    before:pointer-events-none
  "
>

  <!-- Floating Glow BG -->

  <div
    class="
      absolute
      -top-10
      left-[-20%]

      h-40
      w-40

      rounded-full

      bg-cyan-300/30

      blur-3xl

      transition-all
      duration-700

      group-hover:scale-150
      group-hover:translate-x-10
    "
  ></div>

  <div
    class="
      absolute
      bottom-[-60px]
      right-[-30px]

      h-44
      w-44

      rounded-full

      bg-purple-500/30

      blur-3xl

      transition-all
      duration-700

      group-hover:scale-150
    "
  ></div>

  <!-- Glass Layer -->

  <div
    class="
      absolute
      inset-[3px]

      rounded-[30px]

      bg-[linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.04),rgba(0,0,0,0.08))]

      backdrop-blur-xl
    "
  ></div>

  <!-- 3D Inner Depth -->

  <div
    class="
      absolute
      inset-0

      rounded-[34px]

      shadow-[inset_0_2px_5px_rgba(255,255,255,0.6),inset_0_-12px_20px_rgba(0,0,0,0.35)]
    "
  ></div>

  <!-- Neon Border -->

  <div
    class="
      absolute
      inset-0

      rounded-[34px]

      border
      border-cyan-200/70

      shadow-[0_0_12px_rgba(255,255,255,0.9),0_0_35px_rgba(34,211,238,0.8)]
    "
  ></div>

  <!-- Shine Sweep -->

  <div
    class="
      absolute
      top-0
      left-[-140%]

      h-full
      w-[60%]

      rotate-12

      bg-gradient-to-r
      from-transparent
      via-white/90
      to-transparent

      blur-[12px]

      transition-all
      duration-[1400ms]

      group-hover:left-[180%]
    "
  ></div>

  <!-- Top Edge Highlight -->

  <div
    class="
      absolute
      top-0
      left-[10%]

      h-[2px]
      w-[80%]

      rounded-full

      bg-white/80

      blur-[1px]
    "
  ></div>

  <!-- Floating Particles -->

  <span
    class="
      absolute
      top-4
      left-8

      h-3
      w-3

      rounded-full

      bg-white

      shadow-[0_0_15px_white]

      animate-pulse
    "
  ></span>

  <span
    class="
      absolute
      bottom-5
      right-10

      h-2.5
      w-2.5

      rounded-full

      bg-cyan-200

      shadow-[0_0_15px_rgba(34,211,238,1)]

      animate-bounce
    "
  ></span>

  <!-- Content -->

  <span
    class="
      relative
      z-20

      flex
      items-center
      justify-center
      gap-3

      transition-all
      duration-500

      [text-shadow:0_0_20px_rgba(255,255,255,0.9)]
    "
  >

    <i
      class="
        fa-solid
        fa-arrow-right-to-bracket

        text-2xl

        transition-all
        duration-500

        group-hover:rotate-[15deg]
        group-hover:scale-125
        group-hover:translate-x-1
      "
    ></i>

    <span
      class="
        bg-gradient-to-r
        from-white
        via-cyan-100
        to-white

        bg-clip-text
        text-transparent
      "
    >
      Login
    </span>

  </span>

</button>

        </form>

        <!-- Footer -->

        <div
            class="
                mt-8
                text-center
                text-sm
                text-gray-400
            "
        >
            © 2026 Retail Billing System
        </div>

    </div>

</body>

</html>
