<div
    class="
        rounded-[32px]
        bg-gradient-to-br
        from-[#091428]
        via-[#101d3b]
        to-[#1a1040]
        p-8
    "
>

    <div
        class="
            mb-8
            flex
            items-center
            justify-between
        "
    >

        <div>

            <h2
                class="
                    text-4xl
                    font-bold
                    text-white
                "
            >
                Purchase Invoices
            </h2>

            <p
                class="
                    mt-2
                    text-cyan-200/70
                "
            >
                All purchase invoices
            </p>

        </div>

    </div>

    <div class="space-y-5">

        {% for item in purchase_invoices %}

        <div
            class="
                flex
                items-center
                justify-between
                rounded-3xl
                border
                border-cyan-400/10
                bg-cyan-500/5
                p-6
            "
        >

            <div>

                <h3
                    class="
                        text-2xl
                        font-bold
                        text-white
                    "
                >
                    {{ item.party_name }}
                </h3>

                <p class="mt-2 text-cyan-200/70">
                    Invoice :
                    {{ item.invoice_number }}
                </p>

                <p class="text-cyan-200/70">
                    Product :
                    {{ item.product_name }}
                </p>

            </div>

            <div class="text-right">

                <h3
                    class="
                        text-3xl
                        font-bold
                        text-cyan-300
                    "
                >
                    ₹{{ item.total_amount }}
                </h3>

                <button
                    class="
                        mt-3
                        rounded-2xl
                        bg-cyan-500
                        px-5
                        py-3
                        font-semibold
                        text-white
                    "
                >
                    View PDF
                </button>

            </div>

        </div>

        {% empty %}

        <div
            class="
                rounded-3xl
                border
                border-dashed
                border-cyan-400/20
                p-10
                text-center
                text-cyan-200/50
            "
        >
            No Purchase Invoices
        </div>

        {% endfor %}

    </div>

</div>
