{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Purchase
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body
    class="
        min-h-screen
        bg-gradient-to-br
        from-[#050816]
        via-[#091b3d]
        to-[#200b42]
        p-4
        md:p-8
        text-white
    "
>

    <!-- Background Glow -->

    <div
        class="
            fixed
            top-0
            left-0
            h-72
            w-72
            rounded-full
            bg-cyan-500/10
            blur-3xl
        "
    ></div>

    <div
        class="
            fixed
            bottom-0
            right-0
            h-72
            w-72
            rounded-full
            bg-purple-600/10
            blur-3xl
        "
    ></div>

    <!-- Page Wrapper -->

    <div
        class="
            relative
            z-10
            mx-auto
            max-w-7xl
        "
    >

        <!-- Top Header -->

        <div
            class="
                mb-8
                flex
                items-center
                justify-between
            "
        >

            <div>

                <h1
                    class="
                        text-4xl
                        font-black
                        tracking-tight
                    "
                >
                    Purchase Entry
                </h1>

                <p
                    class="
                        mt-2
                        text-cyan-200/70
                    "
                >
                    Manage electronics purchases professionally
                </p>

            </div>

            <a
                href="/dashboard/"
                class="
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    py-3
                    text-cyan-300
                    transition-all
                    duration-300

                    hover:bg-cyan-400/10
                "
            >
                <i class="fa-solid fa-arrow-left"></i>
            </a>

        </div>

        <!-- Reusable Form -->

{% include 'transactions/partials/reusable_form.html' with title="Purchase Entry" %}
    </div>

    <script src="{% static 'transactions/js/purchase.js' %}"></script>

</body>

</html>
