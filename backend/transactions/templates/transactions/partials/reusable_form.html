<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reusable-form</title>
</head>
<body>
    <div
    class="
        relative
        rounded-[32px]
        border
        border-cyan-400/10
        bg-gradient-to-br
        from-[#091428]/95
        via-[#101d3b]/95
        to-[#1a1040]/95
        p-6
        md:p-8
        shadow-[0_0_50px_rgba(34,211,238,0.12)]
        backdrop-blur-3xl
        overflow-hidden
    "
>

    <!-- Neon Glow -->

    <div
        class="
            absolute
            -top-20
            right-0
            h-56
            w-56
            rounded-full
            bg-cyan-500/10
            blur-3xl
        "
    ></div>

    <div
        class="
            absolute
            bottom-0
            left-0
            h-56
            w-56
            rounded-full
            bg-purple-600/10
            blur-3xl
        "
    ></div>

    <!-- Header -->

    <div
        class="
            relative
            z-10
            mb-8
            flex
            items-center
            justify-between
        "
    >

        <div>

            <h2
                class="
                    text-3xl
                    font-bold
                    text-white
                "
            >
                {{ title }}
            </h2>

            <p
                class="
                    mt-2
                    text-sm
                    text-cyan-200/70
                "
            >
                Manage your electronics stock professionally
            </p>

        </div>

        <!-- Icon -->

        <div
            class="
                flex
                h-16
                w-16
                items-center
                justify-center
                rounded-2xl
                bg-gradient-to-br
                from-cyan-400
                to-blue-600
                text-3xl
                shadow-[0_0_30px_rgba(34,211,238,0.45)]
            "
        >
            📦
        </div>

    </div>

    <!-- Form -->

    <form
        method="POST"
        class="
            relative
            z-10
            grid
            grid-cols-1
            gap-6
            md:grid-cols-2
        "
    >

        {% csrf_token %}

        <!-- Party Name -->

<div class="relative group">

    <select
        name="party"
        required

        class="
            peer
            w-full
            rounded-2xl
            border
            border-cyan-400/20
            bg-white/5
            px-5
            pt-7
            pb-3
            text-white
            outline-none
            appearance-none
            transition-all
            duration-300
            focus:border-cyan-300
            focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]
            focus:bg-white/10
        "
    >

        <option value="" disabled selected hidden></option>

        {% if title == 'Purchase Entry' %}

            {% for item in creditors %}

                <option
                    value="{{ item.party_name }}"
                    class="bg-[#0b1730] text-white"
                >
                    {{ item.party_name }}
                </option>

            {% endfor %}

        {% endif %}

        {% if title == 'Sales Entry' %}

            {% for item in debtors %}

                <option
                    value="{{ item.party_name }}"
                    class="bg-[#0b1730] text-white"
                >
                    {{ item.party_name }}
                </option>

            {% endfor %}

        {% endif %}

    </select>

    <label
        class="
            absolute
            left-5
            top-1/2
            -translate-y-1/2
            text-gray-400
            transition-all
            duration-300
            pointer-events-none

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
        "
    >
        {% if title == 'Purchase Entry' %}
            Supplier Name
        {% else %}
            Customer Name
        {% endif %}
    </label>

</div>

<!-- Transaction Date -->

<div class="relative group">

    <input
        type="date"
        name="transaction_date"

        value="{% now 'Y-m-d' %}"

        required

        class="
            peer
            w-full
            rounded-2xl
            border
            border-cyan-400/20
            bg-white/5
            px-5
            pt-7
            pb-3
            text-white
            outline-none
            transition-all
            duration-300
            focus:border-cyan-300
            focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]
            focus:bg-white/10
        "
    >

    <label
        class="
            absolute
            left-5
            top-3
            text-xs
            text-cyan-300
        "
    >
        Transaction Date
    </label>

</div>

        <!-- Product Name -->

        <!-- Product Name -->

<div class="relative group">

    <input
        type="text"
        name="product_name"
        id="productSearch"
        placeholder=" "
        autocomplete="off"
        required

        class="
            peer
            w-full
            rounded-2xl
            border
            border-cyan-400/20
            bg-white/5
            px-5
            pt-7
            pb-3
            text-white
            outline-none
            transition-all
            duration-300

            focus:border-cyan-300

            focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

            focus:bg-white/10
        "
    >

    <label
        class="
            absolute
            left-5
            top-1/2
            -translate-y-1/2
            text-gray-400
            transition-all
            duration-300
            pointer-events-none

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
        "
    >
        Product Name
    </label>

    <!-- Suggestions -->

    <div
        id="productSuggestions"
        class="
            absolute
            left-0
            top-full
            z-50
            mt-2
            hidden
            max-h-72
            w-full
            overflow-y-auto
            rounded-2xl
            border
            border-cyan-400/20
            bg-[#091428]
            shadow-[0_0_25px_rgba(34,211,238,0.18)]
        "
    >

        {% for item in stocks %}

            <div
                class="
                    cursor-pointer
                    border-b
                    border-cyan-400/10
                    px-5
                    py-4
                    transition-all
                    duration-300
                    hover:bg-cyan-500/10
                "

               onclick="
    selectProduct(
        '{{ item.product_name }}',
        '{{ item.unit }}',
        '{{ item.purchase_price }}',
        '{{ item.selling_price }}'
    )
"
            >

                <div
                    class="
                        flex
                        items-center
                        justify-between
                    "
                >

                    <span
                        class="
                            font-medium
                            text-white
                        "
                    >
                        {{ item.product_name }}
                    </span>

                    <span
                        class="
                            rounded-xl
                            bg-cyan-500/10
                            px-3
                            py-1
                            text-xs
                            text-cyan-300
                        "
                    >
                        Qty :
                        {{ item.quantity }}
                    </span>

                </div>

            </div>

        {% endfor %}

    </div>

</div>

               <!-- Unit Type -->

<div class="relative group">

    <select
        name="unit"
            id="unitType"
        required

        class="
            peer
            w-full
            rounded-2xl
            border
            border-cyan-400/20
            bg-white/5

            px-5
            pt-7
            pb-3

            text-white
            outline-none
            appearance-none

            transition-all
            duration-300

            focus:border-cyan-300

            focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

            focus:bg-white/10
        "
    >

        <option value="" disabled selected hidden></option>

        <option
    value="Pieces"
    class="bg-[#0b1730] text-white"
>
    Pieces
</option>

<option
    value="Feet"
    class="bg-[#0b1730] text-white"
>
    Feet
</option>

<option
    value="Meter"
    class="bg-[#0b1730] text-white"
>
    Meter
</option>

<option
    value="Roll"
    class="bg-[#0b1730] text-white"
>
    Roll
</option>

    </select>

    <!-- Floating Label -->

    <label
        class="
            absolute
            left-5
            top-1/2
            -translate-y-1/2

            text-gray-400

            transition-all
            duration-300

            pointer-events-none

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
        "
    >
        Unit Type
    </label>

    <!-- Custom Arrow -->

    <div
        class="
            pointer-events-none
            absolute
            right-5
            top-1/2
            -translate-y-1/2
            text-cyan-300
            text-sm
        "
    >
        ▼
    </div>

</div> 

       <!-- Quantity -->

        <div class="relative group">

            <input
                type="number"
                name="quantity"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Quantity
            </label>

        </div>

         <!-- Selling Price -->
{% if title == 'Sales Entry' %}
        <div class="relative group">

            <input
                type="number"
                step="0.01"
                id="sellingPrice"
                name="selling_price"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Selling Price
            </label>

        </div>
        {% endif %}
       

        <!-- Purchase Price -->

        <div class="relative group">

            <input
                type="number"
                step="0.01"
                id="purchasePrice"
                name="purchase_price"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Purchase Price
            </label>

        </div>
<!-- Total Amount -->

<div class="relative group">

    <input
        type="text"
        id="totalAmount"
        readonly

        class="
            peer
            w-full
            rounded-2xl
            border
            border-green-400/20
            bg-green-500/5
            px-5
            pt-7
            pb-3
            text-green-300
            outline-none
            transition-all
            duration-300
        "
    >

    <label
        class="
            absolute
            left-5
            top-3
            text-xs
            text-green-300
        "
    >
        Total Amount
    </label>

</div>
    <!-- Unit -->



 <!-- Net Profit -->
{% if title == 'Sales Entry' %}

        <div class="relative group">

            <input
                type="text"
                name="net_profit"
id="netProfit"
readonly
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Net Profit on this Product
            </label>

        </div>
{% endif %}
        <!-- Submit Button -->

        <div class="md:col-span-2">

            <button
                type="submit"

                class="
                    w-full
                    rounded-2xl
                    bg-gradient-to-r
                    from-cyan-400
                    via-blue-500
                    to-purple-600
                    py-4
                    text-lg
                    font-bold
                    text-white
                    transition-all
                    duration-300

                    shadow-[0_0_30px_rgba(34,211,238,0.45)]

                    hover:scale-[1.01]

                    hover:shadow-[0_0_45px_rgba(34,211,238,0.65)]
                "
            >
                Save Transaction
            </button>

        </div>

    </form>

</div>
<script>

    const quantityInput =
        document.querySelector(
            'input[name="quantity"]'
        );

    const purchaseInput =
        document.querySelector(
            'input[id="purchasePrice"]'
        );

    const totalInput =
        document.getElementById(
            'totalAmount'
        );

   function calculateTotal() {

    const quantity =
        parseFloat(
            quantityInput.value
        ) || 0;

    // Sales Price

    const sellingInput =
        document.getElementById(
            'sellingPrice'
        );

    let selling = 0;

    if (sellingInput) {

        selling =
            parseFloat(
                sellingInput.value
            ) || 0;

    }

    // Purchase Entry

    else {

        selling =
            parseFloat(
                purchaseInput.value
            ) || 0;

    }

    // Final Total

    const total =
        quantity * selling;

    totalInput.value =
        '₹ ' + total.toFixed(2);

}

    quantityInput.addEventListener(
    'input',
    () => {

        calculateTotal();

        updateProfit();

    }
);

   purchaseInput.addEventListener(
    'input',
    () => {

        calculateTotal();

        updateProfit();

    }
);

    const sellingPriceInput =
    document.getElementById(
        'sellingPrice'
    );

if (sellingPriceInput) {

    sellingPriceInput.addEventListener(
    'input',
    () => {

        calculateTotal();

        updateProfit();

    }
);

}

    const productSearch =
        document.getElementById(
            'productSearch'
        );

    const productSuggestions =
        document.getElementById(
            'productSuggestions'
        );

    const suggestionItems =
        productSuggestions.querySelectorAll(
            'div[onclick]'
        );

    // Open Suggestions

    productSearch.addEventListener(
        'focus',
        () => {

            productSuggestions
                .classList
                .remove('hidden');

        }
    );

    // Search Filter

    productSearch.addEventListener(
        'keyup',
        () => {

            const value =
                productSearch.value
                .toLowerCase();

            suggestionItems.forEach((item) => {

                const text =
                    item.innerText
                    .toLowerCase();

                item.style.display =
                    text.includes(value)

                    ? 'block'

                    : 'none';

            });

        }
    );

    // Select Product

  function selectProduct(
    name,
    unit,
    purchase,
    selling
) {

    // Product Name

    productSearch.value = name;

    // Unit

    document.getElementById(
        'unitType'
    ).value = unit;

    // Purchase Price

    document.getElementById(
        'purchasePrice'
    ).value = purchase;

    // Selling Price

    const sellingInput =
        document.getElementById(
            'sellingPrice'
        );

    if (sellingInput) {

        sellingInput.value = selling;

    }

    // Net Profit

    const netProfitInput =
        document.getElementById(
            'netProfit'
        );

    if (
        netProfitInput &&
        selling
    ) {

        const quantity =
    parseFloat(
        quantityInput.value
    ) || 0;

const singleProfit =
    parseFloat(selling)
    -
    parseFloat(purchase);

const totalProfit =
    singleProfit * quantity;

netProfitInput.value =
    '₹ ' + totalProfit.toFixed(2);

    }

    // Close Suggestions

    productSuggestions
        .classList
        .add('hidden');

    // Recalculate Total

    calculateTotal();

}
calculateTotal();
    // Outside Click Close

    document.addEventListener(
        'click',
        (e) => {

            if (
                !productSearch.contains(e.target)
                &&
                !productSuggestions.contains(e.target)
            ) {

                productSuggestions
                    .classList
                    .add('hidden');

            }

        }
    );

function updateProfit() {

    const sellingInput =
        document.getElementById(
            'sellingPrice'
        );

    const netProfitInput =
        document.getElementById(
            'netProfit'
        );

    if (
        !sellingInput ||
        !netProfitInput
    ) {
        return;
    }

    const quantity =
        parseFloat(
            quantityInput.value
        ) || 0;

    const selling =
        parseFloat(
            sellingInput.value
        ) || 0;

    const purchase =
        parseFloat(
            purchaseInput.value
        ) || 0;

    const totalProfit =
        (
            selling - purchase
        ) * quantity;

    netProfitInput.value =
        '₹ ' +
        totalProfit.toFixed(2);

}
calculateTotal();
updateProfit();
</script>
</body>
</html>
