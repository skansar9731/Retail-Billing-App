<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reusable-form</title>
</head>
<body>
    <div
    class="
        relative
        rounded-[32px]
        border
        border-cyan-400/10
        bg-gradient-to-br
        from-[#091428]/95
        via-[#101d3b]/95
        to-[#1a1040]/95
        p-6
        md:p-8
        shadow-[0_0_50px_rgba(34,211,238,0.12)]
        backdrop-blur-3xl
        overflow-hidden
    "
>

    <!-- Neon Glow -->

    <div
        class="
            absolute
            -top-20
            right-0
            h-56
            w-56
            rounded-full
            bg-cyan-500/10
            blur-3xl
        "
    ></div>

    <div
        class="
            absolute
            bottom-0
            left-0
            h-56
            w-56
            rounded-full
            bg-purple-600/10
            blur-3xl
        "
    ></div>

    <!-- Header -->

    <div
        class="
            relative
            z-10
            mb-8
            flex
            items-center
            justify-between
        "
    >

        <div>

            <h2
                class="
                    text-3xl
                    font-bold
                    text-white
                "
            >
                {{ title }}
            </h2>

            <p
                class="
                    mt-2
                    text-sm
                    text-cyan-200/70
                "
            >
                Manage your electronics stock professionally
            </p>

        </div>

        <!-- Icon -->

        <div
            class="
                flex
                h-16
                w-16
                items-center
                justify-center
                rounded-2xl
                bg-gradient-to-br
                from-cyan-400
                to-blue-600
                text-3xl
                shadow-[0_0_30px_rgba(34,211,238,0.45)]
            "
        >
            📦
        </div>

    </div>

    <!-- Form -->

    <form
        method="POST"
        class="
            relative
            z-10
            grid
            grid-cols-1
            gap-6
            md:grid-cols-2
        "
    >

        {% csrf_token %}

        <!-- Product Name -->

        <div class="relative group">

            <input
                type="text"
                name="product_name"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Product Name
            </label>

        </div>

       <!-- Quantity -->

        <div class="relative group">

            <input
                type="number"
                name="quantity"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Quantity
            </label>

        </div>

         <!-- Selling Price -->

        <div class="relative group">

            <input
                type="number"
                step="0.01"
                name="selling_price"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Selling Price
            </label>

        </div>
        
       

        <!-- Purchase Price -->

        <div class="relative group">

            <input
                type="number"
                step="0.01"
                name="purchase_price"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Purchase Price
            </label>

        </div>

    <!-- Unit -->

       <!-- Unit Type -->

<div class="relative group">

    <select
        name="unit"
        required

        class="
            peer
            w-full
            rounded-2xl
            border
            border-cyan-400/20
            bg-white/5

            px-5
            pt-7
            pb-3

            text-white
            outline-none
            appearance-none

            transition-all
            duration-300

            focus:border-cyan-300

            focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

            focus:bg-white/10
        "
    >

        <option value="" disabled selected hidden></option>

        <option
    value="pcs"
    class="bg-[#0b1730] text-white"
>
    Pieces
</option>

<option
    value="ft"
    class="bg-[#0b1730] text-white"
>
    Feet
</option>

<option
    value="mtr"
    class="bg-[#0b1730] text-white"
>
    Meter
</option>

<option
    value="roll"
    class="bg-[#0b1730] text-white"
>
    Roll
</option>

    </select>

    <!-- Floating Label -->

    <label
        class="
            absolute
            left-5
            top-1/2
            -translate-y-1/2

            text-gray-400

            transition-all
            duration-300

            pointer-events-none

            peer-focus:top-3
            peer-focus:text-xs
            peer-focus:text-cyan-300

            peer-valid:top-3
            peer-valid:text-xs
            peer-valid:text-cyan-300
        "
    >
        Unit Type
    </label>

    <!-- Custom Arrow -->

    <div
        class="
            pointer-events-none
            absolute
            right-5
            top-1/2
            -translate-y-1/2
            text-cyan-300
            text-sm
        "
    >
        ▼
    </div>

</div> 

 <!-- Net Profit -->

        <div class="relative group">

            <input
                type="text"
                name="sku"
                placeholder=" "
                required

                class="
                    peer
                    w-full
                    rounded-2xl
                    border
                    border-cyan-400/20
                    bg-white/5
                    px-5
                    pt-7
                    pb-3
                    text-white
                    outline-none
                    transition-all
                    duration-300

                    focus:border-cyan-300

                    focus:shadow-[0_0_20px_rgba(34,211,238,0.45)]

                    focus:bg-white/10
                "
            >

            <label
                class="
                    absolute
                    left-5
                    top-1/2
                    -translate-y-1/2
                    text-gray-400
                    transition-all
                    duration-300
                    pointer-events-none

                    peer-focus:top-3
                    peer-focus:text-xs
                    peer-focus:text-cyan-300

                    peer-valid:top-3
                    peer-valid:text-xs
                    peer-valid:text-cyan-300
                "
            >
                Net Profit on this Product
            </label>

        </div>

        <!-- Submit Button -->

        <div class="md:col-span-2">

            <button
                type="submit"

                class="
                    w-full
                    rounded-2xl
                    bg-gradient-to-r
                    from-cyan-400
                    via-blue-500
                    to-purple-600
                    py-4
                    text-lg
                    font-bold
                    text-white
                    transition-all
                    duration-300

                    shadow-[0_0_30px_rgba(34,211,238,0.45)]

                    hover:scale-[1.01]

                    hover:shadow-[0_0_45px_rgba(34,211,238,0.65)]
                "
            >
                Save Transaction
            </button>

        </div>

    </form>

</div>
</body>
</html>
